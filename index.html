<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Incoming Fall 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .badge {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #999;
      margin-bottom: 40px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 440px;
    }

    .team-card {
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 28px 24px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      background: #f0f0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      margin-bottom: 16px;
    }

    .team-card h3 {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    .team-card span {
      font-size: 13px;
      color: #999;
    }

    @media (max-width: 480px) {
      .team-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="badge">Incoming Fall 2026</div>

  <div class="team-grid">
    <div class="team-card">
      <div class="avatar">WL</div>
      <h3>Wallace Lau</h3>
      <span>Co-Founder</span>
    </div>
    <div class="team-card">
      <div class="avatar">J</div>
      <h3>Johnathan</h3>
      <span>Founding Engineer</span>
    </div>
  </div>

</body>
</html>
